services:
  app:
    build: .
    container_name: gestao-sei-backend-app
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/gestaosei
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - TZ=America/Sao_Paulo
    depends_on:
      - db
    networks:
      - gestaosei-network

  db:
    image: postgres:16
    container_name: gestao-sei-backend-db
    environment:
      - POSTGRES_DB=gestaosei
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5433:5432"
    volumes:
      - gestaosei-data:/var/lib/postgresql/data
    networks:
      - gestaosei-network

volumes:
  gestaosei-data:

networks:
  gestaosei-network:
    driver: bridge
